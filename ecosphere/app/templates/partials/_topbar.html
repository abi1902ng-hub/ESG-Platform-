<header class="topbar">
  <button class="btn btn-icon d-lg-none" id="sidebarToggle" aria-label="Toggle sidebar">
    <i class="bi bi-list"></i>
  </button>

  <div class="topbar-search d-none d-md-flex">
    <i class="bi bi-search"></i>
    <input type="text" placeholder="Search departments, policies, challenges…">
  </div>

  <div class="topbar-actions">
    <button class="btn btn-icon" id="themeToggle" title="Toggle theme">
      <i class="bi bi-moon-stars" id="themeIcon"></i>
    </button>

    <div class="dropdown">
      <button class="btn btn-icon position-relative" data-bs-toggle="dropdown">
        <i class="bi bi-bell"></i>
        <span class="notif-dot"></span>
      </button>
      <div class="dropdown-menu dropdown-menu-end notif-panel">
        <div class="notif-header">Notifications</div>
        <div class="notif-empty text-muted small p-3">No new notifications</div>
      </div>
    </div>

    <div class="dropdown">
      <button class="btn user-chip" data-bs-toggle="dropdown">
        <span class="avatar-circle">{{ current_user.first_name[0] }}{{ current_user.last_name[0] }}</span>
        <span class="d-none d-md-inline">{{ current_user.full_name }}</span>
        <i class="bi bi-chevron-down small"></i>
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><span class="dropdown-item-text text-muted small">{{ current_user.role.display_name }}</span></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item" href="{{ url_for('auth.profile') }}"><i class="bi bi-person me-2"></i>Profile</a></li>
        <li><a class="dropdown-item" href="{{ url_for('auth.change_password') }}"><i class="bi bi-key me-2"></i>Change Password</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item text-danger" href="{{ url_for('auth.logout') }}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
      </ul>
    </div>
  </div>
</header>
