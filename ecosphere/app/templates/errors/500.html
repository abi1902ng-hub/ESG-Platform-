{% extends "base.html" %}
{% block title %}Server Error · {{ app_name }}{% endblock %}
{% block body %}
<div class="auth-shell">
  <div class="auth-card text-center">
    <i class="bi bi-exclamation-octagon" style="font-size:2.5rem;color:var(--accent-danger);"></i>
    <h4 class="mt-3 mb-1">Something Went Wrong</h4>
    <p class="text-secondary small mb-4">An unexpected error occurred. Our team has been notified.</p>
    <a href="{{ url_for('main.landing') }}" class="btn btn-primary px-4">Go Home</a>
  </div>
</div>
{% endblock %}
